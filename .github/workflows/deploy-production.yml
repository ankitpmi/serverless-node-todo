name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Placeholder for tests — will run when Phase: Automated Testing is added
      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Deploy to Production
        run: serverless deploy --stage production --verbose
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Update Lambda Aliases
        run: |
          # Fetch all Lambda function names from the deployed CloudFormation stack
          # This way function names are always dynamic — no hardcoding needed
          FUNCTIONS=$(aws cloudformation list-stack-resources \
            --stack-name serverless-todo-app-production \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text)

          for FUNCTION in $FUNCTIONS
          do
            # Get the latest published version number
            VERSION=$(aws lambda list-versions-by-function \
              --function-name "$FUNCTION" \
              --query 'Versions[-1].Version' \
              --output text)

            # Check if alias already exists
            ALIAS_EXISTS=$(aws lambda get-alias \
              --function-name "$FUNCTION" \
              --name production \
              --query 'Name' \
              --output text 2>/dev/null || echo "NOT_FOUND")

            if [ "$ALIAS_EXISTS" = "NOT_FOUND" ]; then
              # Create alias if it doesn't exist yet
              aws lambda create-alias \
                --function-name "$FUNCTION" \
                --name production \
                --function-version "$VERSION"
              echo "Created alias: $FUNCTION -> production -> Version $VERSION"
            else
              # Update alias to point to latest version
              aws lambda update-alias \
                --function-name "$FUNCTION" \
                --name production \
                --function-version "$VERSION"
              echo "Updated alias: $FUNCTION -> production -> Version $VERSION"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Print deployed URLs
        run: serverless info --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}