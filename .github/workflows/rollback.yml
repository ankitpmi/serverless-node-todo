name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to rollback (staging or production)"
        required: true
        type: choice
        options:
          - staging
          - production
      reason:
        description: "Reason for rollback (for audit trail)"
        required: true
        type: string

# ─────────────────────────────────────────────────────────────────────────────
# MANUAL ROLLBACK
#
# Instantly restores 100% traffic to Blue (previous stable version)
# for all Lambda functions in the given stage.
#
# When to use:
#   • You notice issues after a deployment that the canary window missed
#   • A CloudWatch alarm fired but auto-rollback didn't catch it in time
#   • You want to rollback proactively before issues escalate
#
# How it works:
#   • Reads the current alias primary FunctionVersion (Blue)
#   • Clears any routing-config (removes Green weight)
#   • Result: 100% traffic back on Blue instantly
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.stage }}
    runs-on: ubuntu-latest

    steps:
      - name: Log rollback intent
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🚨 MANUAL ROLLBACK INITIATED"
          echo "  Stage    : ${{ github.event.inputs.stage }}"
          echo "  Reason   : ${{ github.event.inputs.reason }}"
          echo "  Triggered: ${{ github.actor }}"
          echo "  Time     : $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Rollback all functions to Blue
        run: |
          STAGE="${{ github.event.inputs.stage }}"
          STACK_NAME="serverless-todo-app-${STAGE}"
          REGION="ap-south-1"

          echo "Fetching functions from stack: $STACK_NAME"

          FUNCTIONS=$(aws cloudformation list-stack-resources \
            --stack-name "$STACK_NAME" \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text \
            --region "$REGION")

          if [ -z "$FUNCTIONS" ]; then
            echo "❌ No functions found in stack $STACK_NAME"
            exit 1
          fi

          echo "Functions to rollback: $FUNCTIONS"
          echo ""

          for FUNCTION in $FUNCTIONS; do
            # The alias primary version IS Blue — just clear the routing-config
            BLUE_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION" \
              --name "$STAGE" \
              --query 'FunctionVersion' \
              --output text \
              --region "$REGION" 2>/dev/null || echo "NOT_FOUND")

            if [ "$BLUE_VERSION" = "NOT_FOUND" ]; then
              echo "⚠️  [$FUNCTION] Alias '$STAGE' not found — skipping"
              continue
            fi

            # Clear routing-config → 100% Blue
            aws lambda update-alias \
              --function-name "$FUNCTION" \
              --name "$STAGE" \
              --function-version "$BLUE_VERSION" \
              --routing-config AdditionalVersionWeights={} \
              --region "$REGION"

            echo "✅ [$FUNCTION] Restored to Blue v$BLUE_VERSION (100%)"
          done

          echo ""
          echo "🔵 Manual rollback complete for stage: $STAGE"
          echo "   All traffic is now on Blue (previous stable version)."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Post rollback summary
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────┐"
          echo "│  Rollback Summary                               │"
          echo "│  Stage   : ${{ github.event.inputs.stage }}     "
          echo "│  By      : ${{ github.actor }}                  "
          echo "│  Reason  : ${{ github.event.inputs.reason }}    "
          echo "│  Status  : ${{ job.status }}                    "
          echo "└─────────────────────────────────────────────────┘"
          echo ""
          echo "Next steps:"
          echo "  1. Investigate the issue in CloudWatch Logs"
          echo "  2. Fix the bug in a new branch"
          echo "  3. Redeploy via the normal deploy workflow"