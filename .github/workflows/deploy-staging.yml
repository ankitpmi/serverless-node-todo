name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Placeholder for tests — will run when Phase: Automated Testing is added
      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Deploy to Staging
        run: serverless deploy --stage staging --verbose
      - name: Update Lambda Aliases
        run: |
          FUNCTIONS=(
            "serverless-todo-app-staging-updateTodo"
            "serverless-todo-app-staging-getTodos"
            "serverless-todo-app-staging-getTodo"
            "serverless-todo-app-staging-deleteTodo"
            "serverless-todo-app-staging-createTodos"
            "serverless-todo-app-staging-createTodo"
          )

          for FUNCTION in "${FUNCTIONS[@]}"
          do
            VERSION=$(aws lambda list-versions-by-function \
              --function-name "$FUNCTION" \
              --query 'Versions[-1].Version' \
              --output text)
          
            aws lambda update-alias \
              --function-name "$FUNCTION" \
              --name prod \
              --function-version "$VERSION"
            
            echo "$FUNCTION -> Version $VERSION"
          done

        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Print deployed URLs
        run: serverless info --stage staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}