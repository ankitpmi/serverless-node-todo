name: Deploy to Staging

on:
  push:
    branches:
      - staging

# ─────────────────────────────────────────────────────────────────────────────
# BLUE-GREEN (CANARY) DEPLOYMENT — STAGING
#
# Strategy:
#   1. Deploy new Lambda version (Green) alongside existing (Blue)
#   2. Shift 10% traffic → Green via alias routing-config
#   3. Wait 5 min and check CloudWatch error rate + p95 duration
#   4a. HEALTHY  → shift 100% to Green, retire Blue weight
#   4b. UNHEALTHY → rollback alias to 100% Blue, fail the workflow
#
# Rollback triggers:
#   • CloudWatch alarm breach  (checked via check-canary-health.sh)
#   • Error rate spike         (same script)
#   • Manual trigger           (use rollback.yml workflow)
# ─────────────────────────────────────────────────────────────────────────────

env:
  STAGE: staging
  REGION: ap-south-1
  STACK_NAME: serverless-todo-app-staging
  CANARY_WEIGHT: 0.1        # 10% traffic to Green during canary window
  CANARY_WAIT_SECONDS: 300  # 5 minutes observation window

jobs:
  deploy:
    name: Blue-Green Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      # ── Setup ───────────────────────────────────────────────────────────────

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Make scripts executable
        run: chmod +x scripts/check-canary-health.sh

      # ── Deploy (publish new Green version) ─────────────────────────────────

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Deploy to Staging
        run: serverless deploy --stage ${{ env.STAGE }} --verbose
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      # ── Blue-Green Canary Shift ─────────────────────────────────────────────

      - name: Start Canary — shift 10% traffic to Green
        id: canary_start
        run: |
          # Fetch all Lambda functions from the CloudFormation stack
          FUNCTIONS=$(aws cloudformation list-stack-resources \
            --stack-name ${{ env.STACK_NAME }} \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text)

          echo "Functions found: $FUNCTIONS"

          # Store function list for later steps
          echo "functions<<EOF" >> $GITHUB_OUTPUT
          echo "$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          for FUNCTION in $FUNCTIONS; do
            # Get the latest published version (Green)
            GREEN_VERSION=$(aws lambda list-versions-by-function \
              --function-name "$FUNCTION" \
              --query 'Versions[-1].Version' \
              --output text)

            # Get the currently live version from alias (Blue)
            BLUE_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION" \
              --name ${{ env.STAGE }} \
              --query 'FunctionVersion' \
              --output text 2>/dev/null || echo "$GREEN_VERSION")

            echo "[$FUNCTION] Blue=$BLUE_VERSION  Green=$GREEN_VERSION"

            # If Blue and Green are the same (first deploy), skip canary
            if [ "$BLUE_VERSION" = "$GREEN_VERSION" ]; then
              echo "[$FUNCTION] First deploy or no version change — skipping canary split"
              aws lambda update-alias \
                --function-name "$FUNCTION" \
                --name ${{ env.STAGE }} \
                --function-version "$GREEN_VERSION"
              continue
            fi

            # Route 10% traffic → Green, 90% stays on Blue
            aws lambda update-alias \
              --function-name "$FUNCTION" \
              --name ${{ env.STAGE }} \
              --function-version "$BLUE_VERSION" \
              --routing-config AdditionalVersionWeights={"$GREEN_VERSION"=${{ env.CANARY_WEIGHT }}}

            echo "[$FUNCTION] Canary started: 90% Blue(v$BLUE_VERSION) / 10% Green(v$GREEN_VERSION)"
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.REGION }}

      # ── Health Check ────────────────────────────────────────────────────────

      - name: Monitor Canary Health
        id: health_check
        run: |
          # Check health against the createTodo function as the primary signal.
          # It's the most write-critical function — a good proxy for overall health.
          PRIMARY_FUNCTION="${{ env.STACK_NAME }}-createTodo"

          ./scripts/check-canary-health.sh \
            ${{ env.STAGE }} \
            "$PRIMARY_FUNCTION" \
            ${{ env.CANARY_WAIT_SECONDS }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.REGION }}

      # ── Rollback (runs only if health check failed) ─────────────────────────

      - name: ROLLBACK — restore 100% traffic to Blue
        if: failure() && steps.canary_start.outcome == 'success'
        run: |
          echo "🚨 Rolling back all functions to Blue..."

          FUNCTIONS=$(aws cloudformation list-stack-resources \
            --stack-name ${{ env.STACK_NAME }} \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text)

          for FUNCTION in $FUNCTIONS; do
            # Blue is currently the alias's primary FunctionVersion
            BLUE_VERSION=$(aws lambda get-alias \
              --function-name "$FUNCTION" \
              --name ${{ env.STAGE }} \
              --query 'FunctionVersion' \
              --output text)

            # Remove routing-config → 100% traffic back to Blue
            aws lambda update-alias \
              --function-name "$FUNCTION" \
              --name ${{ env.STAGE }} \
              --function-version "$BLUE_VERSION" \
              --routing-config AdditionalVersionWeights={}

            echo "✅ [$FUNCTION] Rolled back to Blue v$BLUE_VERSION"
          done

          echo ""
          echo "🔵 Rollback complete. All traffic restored to Blue."
          exit 1   # fail the workflow so the team is alerted
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.REGION }}

      # ── Full Cutover (runs only if health check passed) ─────────────────────

      - name: CUTOVER — shift 100% traffic to Green
        if: success()
        run: |
          echo "✅ Canary healthy — completing cutover to Green..."

          FUNCTIONS=$(aws cloudformation list-stack-resources \
            --stack-name ${{ env.STACK_NAME }} \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text)

          for FUNCTION in $FUNCTIONS; do
            # Green is the latest published version
            GREEN_VERSION=$(aws lambda list-versions-by-function \
              --function-name "$FUNCTION" \
              --query 'Versions[-1].Version' \
              --output text)

            # Point alias 100% to Green, clear routing-config
            aws lambda update-alias \
              --function-name "$FUNCTION" \
              --name ${{ env.STAGE }} \
              --function-version "$GREEN_VERSION" \
              --routing-config AdditionalVersionWeights={}

            echo "🟢 [$FUNCTION] Cutover complete → v$GREEN_VERSION (100%)"
          done

          echo ""
          echo "🟢 Blue-Green deployment complete. Green is now live."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.REGION }}

      # ── Summary ─────────────────────────────────────────────────────────────

      - name: Print deployed URLs
        if: success()
        run: serverless info --stage ${{ env.STAGE }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}